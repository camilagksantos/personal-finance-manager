<div class="test-container">
  <h1>Finance Manager — Style Test</h1>

  <section>
    <h2>Tokens — Cores</h2>
    <div class="color-grid">
      <div class="swatch" style="background: var(--finance-primary)">Primary</div>
      <div class="swatch" style="background: var(--finance-primary-medium)">Medium</div>
      <div class="swatch" style="background: var(--finance-primary-light)">Light</div>
      <div class="swatch" style="background: var(--finance-success)">Success</div>
      <div class="swatch" style="background: var(--finance-danger)">Danger</div>
      <div class="swatch" style="background: var(--finance-warning)">Warning</div>
    </div>
  </section>

  <section>
    <h2>Angular Material</h2>
    <button mat-flat-button>Flat Button</button>
    <button mat-raised-button>Raised Button</button>
    <button mat-stroked-button>Stroked Button</button>
    <button mat-button>Text Button</button>
  </section>

  <section>
    <h2>Tema</h2>
    <button mat-stroked-button (click)="toggleTheme()">Toggle Light/Dark</button>
    <p>Tema actual: {{ currentTheme() }}</p>
  </section>
</div>
