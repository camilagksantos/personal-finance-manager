spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

logging:
  level:
    com.camilagksantos: DEBUG
    org.springframework.security: DEBUG

app:
  security:
    client-secret: finance-secret-dev